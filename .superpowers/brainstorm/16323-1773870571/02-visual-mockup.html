<style>
  .screen-top { width: 400px; height: 240px; background: #1a1a2e; border: 4px solid #333; margin-bottom: 10px; position: relative; color: white; }
  .screen-bottom { width: 320px; height: 240px; background: #16213e; border: 4px solid #333; margin: 0 auto; position: relative; color: white; }
  .card-placeholder { width: 60px; height: 84px; background: #e94560; border-radius: 4px; display: inline-block; margin: 10px; position: relative; }
  .voucher-placeholder { width: 50px; height: 70px; background: #0f3460; border: 2px solid #533483; border-radius: 4px; display: inline-block; margin: 10px; }
  .btn-shop { background: #533483; border: none; padding: 5px 10px; border-radius: 4px; color: white; font-size: 12px; cursor: pointer; }
  .hud-top { background: rgba(0,0,0,0.5); padding: 5px; font-size: 14px; text-align: center; }
</style>

<h2>Shop Layout Options</h2>
<p class="subtitle">Comparing how we use the dual screens</p>

<div class="options">
  <div class="option" data-choice="faithful" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Faithful Adaptation</h3>
      <div class="screen-top">
        <div class="hud-top">SHOP - $15</div>
        <div style="padding: 20px; text-align: center;">
          <div class="card-placeholder"><div style="position:absolute; bottom:2px; width:100%; text-align:center; font-size:10px;">$4</div></div>
          <div class="card-placeholder"><div style="position:absolute; bottom:2px; width:100%; text-align:center; font-size:10px;">$6</div></div>
          <br>
          <div class="voucher-placeholder"></div>
          <div class="voucher-placeholder"></div>
        </div>
      </div>
      <div class="screen-bottom">
        <div style="padding: 10px; text-align: center;">
          <div style="margin-top: 20px;">
            <button class="btn-shop" style="width: 120px; height: 40px; background: #28a745;">Buy Selected</button>
            <button class="btn-shop" style="width: 120px; height: 40px; background: #007bff; margin-left: 10px;">Next Round</button>
          </div>
          <div style="margin-top: 20px;">
            <button class="btn-shop" style="width: 100px;">Reroll ($5)</button>
          </div>
          <div style="margin-top: 20px; font-size: 12px; color: #aaa;">
            Jokers: 2/5 | Consumables: 1/2
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="utility" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Utility Focus</h3>
      <div class="screen-top">
        <div class="hud-top">Jokers & Tarot</div>
        <div style="padding: 10px; text-align: center;">
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
        </div>
      </div>
      <div class="screen-bottom">
        <div class="hud-top" style="background: #0f3460;">Packs & Vouchers</div>
        <div style="padding: 10px; text-align: center;">
          <div class="voucher-placeholder"></div>
          <div class="voucher-placeholder"></div>
          <div style="margin-top: 10px;">
            <button class="btn-shop" style="width: 90px;">Reroll</button>
            <button class="btn-shop" style="width: 90px; background: #28a745;">Buy</button>
            <button class="btn-shop" style="width: 90px; background: #007bff;">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
